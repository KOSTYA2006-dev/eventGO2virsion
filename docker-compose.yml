version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventgo_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:80"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-eventgo}
      - DB_USERNAME=${DB_USERNAME:-eventgo}
      - DB_PASSWORD=${DB_PASSWORD:-eventgo123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eventgo_network

  db:
    image: mysql:8.0
    container_name: eventgo_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-eventgo}
      - MYSQL_USER=${DB_USERNAME:-eventgo}
      - MYSQL_PASSWORD=${DB_PASSWORD:-eventgo123}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root123}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventgo_network

  # Опционально: Redis для кеширования и очередей
  # redis:
  #   image: redis:7-alpine
  #   container_name: eventgo_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - eventgo_network

volumes:
  db_data:

networks:
  eventgo_network:
    driver: bridge

